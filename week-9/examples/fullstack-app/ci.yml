name: Full-Stack Example CI

on:
  push:
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - "ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - "ci.yml"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: week-9/examples/fullstack-app/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: pytest -q

  frontend-smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: week-9/examples/fullstack-app/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        run: pip install -r requirements.txt

      - name: Verify Streamlit app imports
        run: python -m py_compile app.py

